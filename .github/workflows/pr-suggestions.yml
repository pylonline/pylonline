name: PR Suggestions

on:
  pull_request_target:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  suggest-release-backmerge:
    if: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - name: Comment release -> main reminder
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PACKAGES_PAT || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const compareUrl = `https://github.com/${owner}/${repo}/compare/main...release?expand=1`;
            const body = [
              "## Release back-merge reminder",
              "",
              "This PR merged into `release`.",
              "",
              `Open this compare view to create/update the back-merge PR: ${compareUrl}`,
            ].join("\n");
            try {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            } catch (error) {
              if (error.status === 403) {
                core.warning("Release reminder comment skipped due to token permissions (403).");
                return;
              }
              throw error;
            }
