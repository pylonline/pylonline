name: PR Suggestions

on:
  push:
    branches:
      - release
      - publish
      - publish/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  suggest-release-backmerge:
    if: ${{ github.ref_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - name: Suggest release -> main PR
        run: |
          {
            echo "## PR suggestion link (release -> main)"
            echo "- Open this compare view to create/update the PR:"
            echo "- https://github.com/${{ github.repository }}/compare/main...release?expand=1"
          } >> "$GITHUB_STEP_SUMMARY"

  suggest-publish-pr:
    if: ${{ github.ref_name == 'publish' || startsWith(github.ref_name, 'publish/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Suggest publish -> release PR
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          {
            echo "## PR suggestion link (${BRANCH_NAME} -> release)"
            echo "- Open this compare view to create/update the PR:"
            echo "- https://github.com/${{ github.repository }}/compare/release...${BRANCH_NAME}?expand=1"
          } >> "$GITHUB_STEP_SUMMARY"
