name: Workspace CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  workspace:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PACKAGES_PAT }}
          submodules: recursive

      - name: Validate workspace secret
        env:
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${PACKAGES_TOKEN}" ]; then
            echo "::error::Missing PACKAGES_PAT in the pylonline workspace repo."
            echo "::error::It must allow private repo checkout and GitHub Packages reads."
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure GitHub Packages auth
        env:
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_PAT }}
        run: |
          set -euo pipefail
          {
            echo "@pylonline:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${PACKAGES_TOKEN}"
            echo "always-auth=true"
          } > ~/.npmrc

      - name: Install workspace
        run: pnpm install --no-frozen-lockfile

      - name: Show submodule status
        run: pnpm run submodules:status

      - name: Prepare shared UI for apps
        run: |
          pnpm --filter portal run core-ui:prepare
          pnpm --filter portal run ui:sync
          pnpm --filter pylon run core-ui:prepare
          pnpm --filter pylon run ui:sync

      - name: Run checks
        run: pnpm run check

      - name: Run tests
        run: pnpm run test
