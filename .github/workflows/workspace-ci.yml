name: Workspace CI (Checks + Tests + Coverage)

on:
  # PR validation is the canonical signal for merge readiness.
  pull_request:
    branches:
      - main
      - release
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

jobs:
  workspace:
    if: ${{ github.event_name != 'pull_request' || github.event.action != 'labeled' || contains(fromJSON('["preflight","ci","ut"]'), github.event.label.name) }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PACKAGES_PAT }}
          submodules: recursive

      - name: Validate workspace secret
        env:
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${PACKAGES_TOKEN}" ]; then
            echo "::error::Missing PACKAGES_PAT in the pylonline workspace repo."
            echo "::error::It must allow private repo checkout and GitHub Packages reads."
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure GitHub Packages auth
        env:
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_PAT }}
        run: |
          set -euo pipefail
          {
            echo "@pylonline:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${PACKAGES_TOKEN}"
            echo "always-auth=true"
          } > ~/.npmrc

      - name: Install workspace
        # Workspace root scripts live in package.json:
        #   package.json#L5-L18
        # We allow lockfile refresh here because submodule/package changes can land
        # before the workspace lockfile is intentionally updated.
        run: pnpm install --no-frozen-lockfile

      - name: Show submodule status
        # package.json#L6-L8
        run: pnpm run submodules:status

      - name: Check workspace root
        # package.json root scripts:
        #   check:workspace-root -> core-lint check using workspace core-lint.config.cjs
        # root config now checks only workspace-owned root files and config wrappers.
        run: pnpm run check:workspace-root

      - name: Check core-lint
        # core-lint/package.json#L7-L15 -> "check": node bin/core-lint.cjs check
        # core-lint/bin/core-lint.cjs#L44-L49 -> format + eslint + stylelint + ui checks
        # core-lint/core-lint.config.cjs#L3-L20 defines the checked paths for this repo.
        run: pnpm --filter @pylonline/core-lint --fail-if-no-match run check

      - name: Check core-ui
        # core-ui/package.json#L13-L23 -> shared lint/stylelint/format/check scripts
        # core-ui/core-lint.config.cjs#L3-L20 defines lintRoots/stylelintRoots/formatRoots.
        run: pnpm --filter @pylonline/core-ui --fail-if-no-match run check

      - name: Check scripts
        # scripts/package.json#L6-L17 -> shared lint/stylelint/format/check scripts
        # scripts/core-lint.config.cjs#L3-L18 defines lintRoots/stylelintRoots/formatRoots.
        run: pnpm --filter @pylonline/scripts --fail-if-no-match run check

      - name: Check portal
        # portal/package.json#L31-L36
        #   core-ui:prepare -> scripts/prepare-core-ui.cjs
        #   ui:sync         -> scripts/sync-core-ui.cjs
        #   check           -> core-lint check using portal/core-lint.config.cjs
        # portal/core-lint.config.cjs#L3-L26 also adds ui:check as a repo-specific check.
        run: |
          pnpm --filter @pylonline/portal --fail-if-no-match run core-ui:prepare
          pnpm --filter @pylonline/portal --fail-if-no-match run ui:sync
          pnpm --filter @pylonline/portal --fail-if-no-match run check

      - name: Check pylon
        # pylon/package.json#L10-L27
        #   core-ui:prepare -> scripts/prepare-core-ui.cjs
        #   ui:sync         -> scripts/sync-core-ui.cjs
        #   check           -> core-lint check using pylon/core-lint.config.cjs
        # pylon/core-lint.config.cjs#L3-L25 also adds ui:check as a repo-specific check.
        run: |
          pnpm --filter @pylonline/pylon --fail-if-no-match run core-ui:prepare
          pnpm --filter @pylonline/pylon --fail-if-no-match run ui:sync
          pnpm --filter @pylonline/pylon --fail-if-no-match run check

      - name: Unit tests (workspace aggregate)
        # package.json root test script delegates to child repos with test scripts,
        # including scripts/, portal/, pylon/, core-lint/, and core-ui/.
        run: pnpm run test

      - name: Coverage (workspace aggregate)
        # package.json#L10-L14 now includes workspace-level coverage orchestration.
        # Each repo writes c8 output into its own coverage/ directory and prints a
        # text summary to the job log.
        run: pnpm run coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: workspace-coverage
          path: |
            core-lint/coverage
            core-ui/coverage
            portal/coverage
            pylon/coverage
            scripts/coverage
          if-no-files-found: error

  clear-rerun-label:
    if: ${{ github.event_name == 'pull_request' && needs.workspace.result == 'success' && (contains(github.event.pull_request.labels.*.name, 'ci') || contains(github.event.pull_request.labels.*.name, 'ut')) }}
    needs: [workspace]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Remove consumed rerun labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PACKAGES_PAT || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            for (const name of ["ci", "ut"]) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
              } catch (error) {
                if (error.status === 403) {
                  core.warning("Skipping rerun-label cleanup due to token permissions (403).");
                  return;
                }
                if (error.status !== 404) throw error;
              }
            }
