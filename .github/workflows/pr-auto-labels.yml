name: PR Auto Labels

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  apply-default-pr-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure labels exist and apply to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PACKAGES_PAT || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const desiredLabels = [
              { name: "ut", color: "1D76DB", description: "[Pylon Line] Repository has unit test coverage and unit-test workflows." },
              { name: "ci", color: "0E8A16", description: "[Pylon Line] Repository has pull request CI workflows." },
            ];

            try {
              for (const label of desiredLabels) {
                try {
                  await github.rest.issues.getLabel({ owner, repo, name: label.name });
                } catch (error) {
                  if (error.status !== 404) throw error;
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                }
              }

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: desiredLabels.map((label) => label.name),
              });
            } catch (error) {
              if (error.status === 403) {
                core.warning(
                  "PR label automation is blocked by token permissions. " +
                    "Enable Actions read/write workflow permissions in repository settings."
                );
                return;
              }
              throw error;
            }
